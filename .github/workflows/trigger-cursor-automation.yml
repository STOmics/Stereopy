name: "Trigger Cursor Automation"

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  trigger:
    if: github.event.label.name == 'cursor-fix'
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Skip if already processed
        id: guard
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 20,
            });
            const alreadyProcessed = comments.data.some(c =>
              c.body.includes('Cursor Automation triggered') ||
              c.body.includes('## Assessment')
            );
            if (alreadyProcessed) {
              console.log('Issue already processed by Cursor, skipping.');
            }
            core.setOutput('skip', alreadyProcessed ? 'true' : 'false');

      - name: Collect issue context
        if: steps.guard.outputs.skip != 'true'
        id: issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);

            // Collect existing triage comment if any
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 20,
            });
            const triageComment = comments.data.find(c =>
              c.body.includes('AI Triage Analysis')
            );

            const payload = {
              issue_number: issue.number,
              issue_title: issue.title,
              issue_body: issue.body || '(no body)',
              issue_url: issue.html_url,
              issue_author: issue.user.login,
              existing_labels: labels,
              prior_triage: triageComment ? triageComment.body : null,
            };

            core.setOutput('payload', JSON.stringify(payload));

      - name: Send to Cursor Webhook
        if: steps.guard.outputs.skip != 'true'
        uses: actions/github-script@v7
        env:
          WEBHOOK_URL: ${{ secrets.CURSOR_WEBHOOK_URL }}
          WEBHOOK_KEY: ${{ secrets.CURSOR_WEBHOOK_KEY }}
          ISSUE_PAYLOAD: ${{ steps.issue.outputs.payload }}
        with:
          script: |
            const webhookUrl = process.env.WEBHOOK_URL;
            const webhookKey = process.env.WEBHOOK_KEY;
            const payloadStr = process.env.ISSUE_PAYLOAD;

            if (!webhookUrl || !webhookKey) {
              core.warning('CURSOR_WEBHOOK_URL or CURSOR_WEBHOOK_KEY not set, skipping.');
              return;
            }

            let payload;
            try {
              payload = JSON.parse(payloadStr);
            } catch (e) {
              core.setFailed(`Failed to parse issue payload: ${e.message}`);
              return;
            }

            console.log(`Sending issue #${payload.issue_number} to Cursor Webhook...`);

            const resp = await fetch(webhookUrl, {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${webhookKey}`,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify(payload),
            });

            const body = await resp.text();
            console.log(`Response: ${resp.status} ${resp.statusText}`);
            console.log(`Body: ${body}`);

            if (!resp.ok) {
              core.setFailed(`Webhook returned ${resp.status}: ${body}`);
            }

      - name: Comment that automation started
        if: steps.guard.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## Cursor Automation triggered',
                '',
                'A cloud agent is analyzing this issue. It will:',
                '1. Classify the issue (bug / question / feature request / needs-info)',
                '2. Post a detailed analysis comment',
                '3. If confirmed as a fixable bug, automatically create a PR',
                '',
                'Estimated time: 5-15 minutes.',
              ].join('\n')
            });
